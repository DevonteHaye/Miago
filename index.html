<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIAGO MVP</title>

  <link rel="stylesheet" href="frontend/css/style.css">
  <script src="frontend/js/app.js" defer></script>
</head>

<body>
  <main class="app" id="app"></main>

  <nav class="bottom-nav">
    <button id="nav-rider" onclick="loadPage('rider')">
      <img src="images/bus.png" class="nav-icon" alt="Rides">
    </button>

    <button id="nav-golist" onclick="loadPage('golist')">
      <span class="nav-fallback">☰</span>
    </button>

    <button id="nav-home" class="active" onclick="loadPage('home')">
      <img src="images/home.png" class="nav-icon" alt="Home">
    </button>

    <button id="nav-deals" onclick="loadPage('deals')">
      <img src="images/tag.png" class="nav-icon" alt="Deals">
    </button>

    <button id="nav-profile" onclick="loadPage('profile')">
      <img src="images/profile.png" class="nav-icon" alt="Profile">
    </button>

    <button id="nav-inbox" onclick="loadPage('inbox')">
      <span class="nav-fallback">💬</span>
    </button>
  </nav>
</body>
</html>
